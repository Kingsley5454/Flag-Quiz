  .stat-chip {

  .restart-btn:hover {

  @keyframes correctPulse {

  .flag-card.answered-correct { animation: correctPulse 0.6s ease-out; }

  @media (max-width: 600px) {
    .answers-grid { grid-template-columns: 1fr; }
    .flag-display { width: 280px; height: 186px; }
    .flag-card-inner { padding: 28px 20px 24px; }
    .stat-chip { min-width: 80px; padding: 8px 16px; }

function startTimer() {
  if (timerStarted) return;
  timerStarted = true;
  timerInterval = setInterval(() => {
    timerSeconds++;
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;

  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getWrongOptions(correct, count) {
  const pool = FLAGS.filter(f => f.country !== correct.country);
  return shuffle(pool).slice(0, count);
}

function loadQuestion() {
  answered = false;
  const current = shuffledFlags[currentIndex];

  // Update stats
  document.getElementById('stat-q').textContent = currentIndex + 1;
  document.getElementById('stat-remain').textContent = 50 - currentIndex;
  document.getElementById('q-num').textContent = currentIndex + 1;

  // Progress
  const pct = (currentIndex / 50) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  // Flag image
  const img = document.getElementById('flag-img');
  const display = document.getElementById('flag-display');
  img.src = current.url;
  display.classList.remove('hidden');

  // Build answers
  const wrongs = getWrongOptions(current, 3);
  const options = shuffle([current, ...wrongs]);
  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';

  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `
      <span class="answer-letter">${LETTERS[i]}</span>
      <span class="answer-text">${opt.country}</span>
    `;
    btn.addEventListener('click', () => handleAnswer(opt.country, current.country, btn, options));
    grid.appendChild(btn);
  });

  // Hide result and next
  const banner = document.getElementById('result-banner');
  banner.className = 'result-banner';
  banner.innerHTML = '';
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('flag-card').classList.remove('answered-correct');
}

function handleAnswer(chosen, correct, btn, options) {
  if (answered) return;
  startTimer();
  answered = true;

  const isCorrect = chosen === correct;
  const grid = document.getElementById('answers-grid');
  const allBtns = grid.querySelectorAll('.answer-btn');
  const banner = document.getElementById('result-banner');

  allBtns.forEach((b, i) => {
    b.disabled = true;
    const txt = b.querySelector('.answer-text').textContent;
    if (txt === correct) {
      b.classList.add('correct');
      b.innerHTML += `<span class="answer-icon">✓</span>`;
    } else if (txt === chosen && !isCorrect) {
      b.classList.add('wrong');
      b.innerHTML += `<span class="answer-icon">✗</span>`;
    }
  });

  if (isCorrect) {
    score++;
    streak++;
    document.getElementById('stat-score').textContent = score;
    document.getElementById('stat-streak').textContent = streak;

    banner.className = 'result-banner correct-banner show';
    banner.innerHTML = `✓ &nbsp; Correct! That's <strong>${correct}</strong>`;
    document.getElementById('flag-card').classList.add('answered-correct');

    if (streak >= 3) {
      const badge = document.getElementById('streak-badge');
      document.getElementById('streak-text').textContent = `${streak} STREAK!`;
      badge.classList.add('show');
      setTimeout(() => badge.classList.remove('show'), 2000);
    }
  } else {
    streak = 0;
    document.getElementById('stat-streak').textContent = 0;
    banner.className = 'result-banner wrong-banner show';
    banner.innerHTML = `✗ &nbsp; The answer was <strong>${correct}</strong>`;
  }

  document.getElementById('next-btn').classList.add('show');
}

document.getElementById('next-btn').addEventListener('click', () => {
  currentIndex++;
  if (currentIndex >= 50) {
    showGameOver();
  } else {
    loadQuestion();
  }
});

function showGameOver() {
  stopTimer();
  document.getElementById('game-card').style.display = 'none';
  const go = document.getElementById('game-over');
  go.classList.add('show');
  document.getElementById('final-score').textContent = score;

  const pct = (score / 50) * 100;
  let grade, bg, color;
  if (pct >= 90) { grade = '🏆 WORLD EXPERT'; bg = 'rgba(247,201,72,0.15)'; color = '#f7c948'; }
  else if (pct >= 70) { grade = '🌍 GLOBE TROTTER'; bg = 'rgba(59,175,218,0.15)'; color = '#3bafda'; }
  else if (pct >= 50) { grade = '✈️ TRAVELER'; bg = 'rgba(34,197,94,0.12)'; color = '#22c55e'; }
  else if (pct >= 30) { grade = '🗺️ EXPLORER'; bg = 'rgba(251,146,60,0.12)'; color = '#fb923c'; }
  else { grade = '📚 KEEP STUDYING'; bg = 'rgba(239,68,68,0.1)'; color = '#ef4444'; }

  const badge = document.getElementById('grade-badge');
  badge.textContent = grade;
  badge.style.background = bg;
  badge.style.color = color;
  badge.style.border = `1px solid ${color}40`;

  document.getElementById('progress-fill').style.width = '100%';
  const fm = Math.floor(timerSeconds / 60);
  const fs = timerSeconds % 60;
  document.getElementById('final-time').textContent = '⏱ Total time: ' + fm + ':' + fs.toString().padStart(2,'0');
}

function restartGame() {
  score = 0; streak = 0; currentIndex = 0; answered = false; timerSeconds = 0; timerStarted = false; stopTimer(); document.getElementById('stat-time').textContent = '0:00';
  document.getElementById('stat-score').textContent = 0;
  document.getElementById('stat-streak').textContent = 0;
  shuffledFlags = shuffle(FLAGS);
  document.getElementById('game-over').classList.remove('show');
  document.getElementById('game-card').style.display = 'block';
  loadQuestion();
}

// Start!
shuffledFlags = shuffle(FLAGS);
loadQuestion();
</script>
